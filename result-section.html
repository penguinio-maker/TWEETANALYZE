<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result Section Placeholder</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #11151c;
      --line: #1f2632;
      --soft: #1a2130;
      --glow: rgba(80, 130, 255, 0.16);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 0%, #11182a 0%, var(--bg) 44%);
      font-family: "Segoe UI", Inter, Roboto, Arial, sans-serif;
      color: #eaf0ff;
      padding: 24px;
    }

    #result {
      width: min(760px, 100%);
    }

    .hidden {
      display: none;
    }

    .result-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #131925, var(--panel));
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.42), 0 0 28px var(--glow);
      padding: 24px;
      display: grid;
      gap: 22px;
    }

    .header {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 999px;
      background: linear-gradient(145deg, #263147, #1a2130);
      border: 1px solid #2c3953;
    }

    .identity {
      display: grid;
      gap: 8px;
    }

    .main {
      display: grid;
      gap: 16px;
    }

    .traits {
      display: grid;
      gap: 10px;
    }

    .share {
      justify-self: start;
      width: 170px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid #2d3a53;
      background: linear-gradient(180deg, #1b2434, #151c29);
    }

    .skeleton {
      border-radius: 10px;
      background: linear-gradient(90deg, var(--soft), #232c3d, var(--soft));
      background-size: 220% 100%;
      animation: shimmer 1.6s linear infinite;
      border: 1px solid #273147;
    }

    .w-40 { width: 40%; }
    .w-55 { width: 55%; }
    .w-65 { width: 65%; }
    .w-75 { width: 75%; }
    .h-14 { height: 14px; }
    .h-18 { height: 18px; }
    .h-48 { height: 48px; }
    .h-72 { height: 72px; }

    @keyframes shimmer {
      0% { background-position: 220% 0; }
      100% { background-position: -220% 0; }
    }
  </style>
</head>
<body>
  <section id="result" class="hidden">
    <div class="result-card">
      <header class="header">
        <div class="avatar" aria-hidden="true"></div>
        <div class="identity">
          <div class="skeleton h-18 w-40" aria-hidden="true"></div>
          <div class="skeleton h-14 w-55" aria-hidden="true"></div>
        </div>
      </header>

      <main class="main">
        <div class="skeleton h-18 w-65" aria-hidden="true"></div>

        <div class="traits">
          <div class="skeleton h-14 w-75" aria-hidden="true"></div>
          <div class="skeleton h-14 w-65" aria-hidden="true"></div>
          <div class="skeleton h-14 w-55" aria-hidden="true"></div>
        </div>

        <div class="skeleton h-72" aria-hidden="true"></div>
        <div class="skeleton h-48" aria-hidden="true"></div>
      </main>

      <div class="share" aria-hidden="true"></div>
    </div>
  </section>
</body>
</html>
