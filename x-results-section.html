<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results Section Placeholder</title>
  <style>
    :root {
      --bg: #0b0d11;
      --surface: #12161d;
      --surface-2: #151b24;
      --line: #232b37;
      --text-soft: #91a0b8;
      --accent: #5cc8ff;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Inter, Roboto, Arial, sans-serif;
      color: #eaf2ff;
      background:
        radial-gradient(circle at 14% 12%, rgba(92, 200, 255, 0.08), transparent 35%),
        radial-gradient(circle at 88% 78%, rgba(92, 200, 255, 0.05), transparent 38%),
        var(--bg);
      display: grid;
      place-items: start center;
      padding: 40px 20px;
    }

    #result {
      width: min(1040px, 100%);
      display: grid;
      gap: 18px;
    }

    .panel {
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.35), 0 0 26px rgba(92, 200, 255, 0.08);
      padding: 22px;
    }

    .intro {
      display: grid;
      gap: 14px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      width: 110px;
      height: 28px;
      border-radius: 999px;
    }

    .profile {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      border: 1px solid #2f3b4c;
      background: linear-gradient(145deg, #212b3b, #1a2230);
    }

    .profile-lines {
      display: grid;
      gap: 9px;
    }

    .layout {
      display: grid;
      gap: 16px;
      grid-template-columns: 1.4fr 1fr;
    }

    .main-column,
    .side-column {
      display: grid;
      gap: 16px;
    }

    .primary-card,
    .secondary-grid,
    .insight-zone,
    .highlight,
    .share {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.01);
      padding: 16px;
    }

    .secondary-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .mini-card {
      border: 1px solid #283243;
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 8px;
      min-height: 96px;
      background: rgba(255, 255, 255, 0.01);
    }

    .insight-zone {
      display: grid;
      gap: 10px;
      min-height: 140px;
    }

    .share {
      min-height: 78px;
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .skeleton {
      border: 1px solid #273246;
      border-radius: 10px;
      background: linear-gradient(90deg, #1a2230, #273347, #1a2230);
      background-size: 220% 100%;
      animation: shimmer 1.7s linear infinite;
    }

    .h-10 { height: 10px; }
    .h-12 { height: 12px; }
    .h-14 { height: 14px; }
    .h-18 { height: 18px; }
    .h-24 { height: 24px; }
    .h-54 { height: 54px; }
    .h-82 { height: 82px; }
    .w-24 { width: 24%; }
    .w-32 { width: 32%; }
    .w-40 { width: 40%; }
    .w-48 { width: 48%; }
    .w-55 { width: 55%; }
    .w-65 { width: 65%; }
    .w-72 { width: 72%; }
    .w-84 { width: 84%; }
    .w-full { width: 100%; }

    @keyframes shimmer {
      0% { background-position: 220% 0; }
      100% { background-position: -220% 0; }
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section id="result">
    <header class="panel intro">
      <div class="skeleton h-24 w-40"></div>
      <div class="meta-row">
        <div class="skeleton h-12 w-55"></div>
        <div class="skeleton badge"></div>
      </div>
    </header>

    <section class="panel profile">
      <div class="avatar" aria-hidden="true"></div>
      <div class="profile-lines">
        <div class="skeleton h-18 w-32"></div>
        <div class="skeleton h-14 w-48"></div>
        <div class="skeleton h-10 w-72"></div>
      </div>
    </section>

    <section class="layout">
      <div class="main-column">
        <article class="primary-card">
          <div class="skeleton h-18 w-40"></div>
          <div style="height: 10px;"></div>
          <div class="skeleton h-14 w-84"></div>
          <div style="height: 8px;"></div>
          <div class="skeleton h-14 w-72"></div>
          <div style="height: 14px;"></div>
          <div class="skeleton h-82 w-full"></div>
        </article>

        <div class="secondary-grid">
          <div class="mini-card">
            <div class="skeleton h-12 w-48"></div>
            <div class="skeleton h-54 w-full"></div>
          </div>
          <div class="mini-card">
            <div class="skeleton h-12 w-55"></div>
            <div class="skeleton h-54 w-full"></div>
          </div>
          <div class="mini-card">
            <div class="skeleton h-12 w-40"></div>
            <div class="skeleton h-54 w-full"></div>
          </div>
          <div class="mini-card">
            <div class="skeleton h-12 w-65"></div>
            <div class="skeleton h-54 w-full"></div>
          </div>
        </div>
      </div>

      <aside class="side-column">
        <section class="insight-zone">
          <div class="skeleton h-14 w-55"></div>
          <div class="skeleton h-10 w-84"></div>
          <div class="skeleton h-10 w-72"></div>
          <div class="skeleton h-54 w-full"></div>
        </section>

        <section class="highlight">
          <div class="skeleton h-12 w-48"></div>
          <div style="height: 10px;"></div>
          <div class="skeleton h-14 w-84"></div>
          <div style="height: 8px;"></div>
          <div class="skeleton h-14 w-65"></div>
        </section>

        <section class="share">
          <div class="skeleton h-12 w-40"></div>
          <div class="skeleton h-54 w-full"></div>
        </section>
      </aside>
    </section>
  </section>
</body>
</html>
